[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION  = "10"

  # ─── Firebase Client (NEXT_PUBLIC = browser mein accessible) ──────────────
  NEXT_PUBLIC_FIREBASE_API_KEY               = "AIzaSy_REPLACE_THIS"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN           = "your-project.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID            = "your-project-id"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET        = "your-project.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID   = "123456789012"
  NEXT_PUBLIC_FIREBASE_APP_ID               = "1:123456789012:web:abcdef123456"

  # ─── Razorpay Public Key (browser mein use hoga checkout ke liye) ─────────
  NEXT_PUBLIC_RAZORPAY_KEY_ID               = "rzp_test_REPLACE_THIS"

  # ─── Firebase Admin SDK (server only — API routes ke liye) ────────────────
  FIREBASE_PROJECT_ID                        = "your-project-id"
  FIREBASE_CLIENT_EMAIL                      = "firebase-adminsdk-xxxxx@your-project.iam.gserviceaccount.com"

  # ─── Razorpay Secret (server only) ────────────────────────────────────────
  RAZORPAY_KEY_ID                            = "rzp_test_REPLACE_THIS"
  RAZORPAY_KEY_SECRET                        = "REPLACE_WITH_YOUR_SECRET"

# ─── ⚠️ FIREBASE_PRIVATE_KEY yahan nahi daalo ─────────────────────────────
# Netlify Dashboard mein manually add karo:
# Site Configuration → Environment Variables → Add variable
# Name:  FIREBASE_PRIVATE_KEY
# Value: "-----BEGIN PRIVATE KEY-----\nYOUR_KEY_HERE\n-----END PRIVATE KEY-----\n"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
